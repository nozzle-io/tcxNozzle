name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, stable]
  pull_request:
    branches: [main, stable]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: 2bbb/trussc-actions/.github/workflows/build-addon.yml@build-addon-cache-v1
    with:
      addon_name: "tcxNozzle"
      test_app: "testApp"
      test_mode: "build-only"
      extra_apt_packages: "libdrm-dev libgbm-dev libegl-dev libgl-dev"
